<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador Deportivo — Mundial 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="widget-root">

  <!-- ══════════════════════════════════════════
       BARRA DE PESTAÑAS PRINCIPAL
       ══════════════════════════════════════════ -->
  <nav class="tabs-nav" role="tablist" aria-label="Secciones del widget Mundial 2026">
    <button class="tab-btn active"
            id="tab-marcador"
            role="tab"
            aria-selected="true"
            aria-controls="panel-marcador"
            data-tab="marcador">
       Marcador
    </button>
    <button class="tab-btn"
            id="tab-posiciones"
            role="tab"
            aria-selected="false"
            aria-controls="panel-posiciones"
            data-tab="posiciones">
         Posiciones
    </button>
    <button class="tab-btn"
            id="tab-llave"
            role="tab"
            aria-selected="false"
            aria-controls="panel-llave"
            data-tab="llave">
         Llave 2026
    </button>
  </nav>

  <!-- ══════════════════════════════════════════
       PANEL 1: MARCADOR (carrusel)
       ══════════════════════════════════════════ -->
  <div id="panel-marcador"
       class="tab-panel active"
       role="tabpanel"
       aria-labelledby="tab-marcador">

    <div class="carousel-wrapper">
      <div class="carousel-track" id="carousel-track"
           role="list"
           aria-label="Partidos del Mundial 2026">
        <div class="state-screen" role="status" aria-live="polite">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p>Cargando datos del Mundial&hellip;</p>
        </div>
      </div>
    </div>

    <!-- ── Panel colapsable Team Hub (acordeón) ── -->
    <div id="team-hub" class="team-hub" aria-live="polite" aria-expanded="false">
      <button class="team-hub-close" id="team-hub-close" aria-label="Cerrar panel del equipo">×</button>
      <div class="team-hub-inner" id="team-hub-inner">
        <!-- El contenido se inyecta dinámicamente por script.js -->
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       PANEL 2: POSICIONES
       ══════════════════════════════════════════ -->
  <div id="panel-posiciones"
       class="tab-panel"
       role="tabpanel"
       aria-labelledby="tab-posiciones"
       hidden>

    <div class="group-pills" id="group-pills" role="group" aria-label="Seleccionar grupo">
      <!-- Se renderizan dinámicamente -->
    </div>

    <div class="standings-container" id="standings-container">
      <div class="state-screen">
        <p>Selecciona un grupo para ver las posiciones.</p>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       PANEL 3: LLAVE 2026
       CORRECCIÓN: Eliminada la pastilla "Play-in" (data-phase="PLAY-IN")
       ya que no existe ningún partido con esa fase en data.json.
       El botón activo por defecto pasa a ser "Dieciseisavos" (16avos).
       ══════════════════════════════════════════ -->
  <div id="panel-llave"
       class="tab-panel"
       role="tabpanel"
       aria-labelledby="tab-llave"
       hidden>

    <div class="phase-pills" id="phase-pills" role="group" aria-label="Seleccionar fase eliminatoria">
      <button class="phase-pill active"  data-phase="DIECISEISAVOS">16avos</button>
      <button class="phase-pill"         data-phase="OCTAVOS"      >Octavos</button>
      <button class="phase-pill"         data-phase="CUARTOS"      >Cuartos</button>
      <button class="phase-pill"         data-phase="SEMIFINAL"    >Semifinal</button>
      <button class="phase-pill"         data-phase="FINAL"        >Final</button>
    </div>

    <div class="carousel-wrapper">
      <div class="carousel-track" id="bracket-track"
           role="list"
           aria-label="Partidos de la fase eliminatoria">
        <div class="state-screen" role="status">
          <p>Selecciona una fase para ver los partidos.</p>
        </div>
      </div>
    </div>

  </div>

</div><!-- /#widget-root -->

<!-- Sin SDKs de Firebase — solo script.js -->
<script src="script.js"></script>

</body>
</html>
